name: Sync Secrets → Vercel Env Vars

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '.github/workflows/sync-env-to-vercel.yml'

# ─────────────────────────────────────────────────────────────────────────────
# ABOUT THIS WORKFLOW
# GitHub Secrets is the single source of truth for env vars.
# This workflow pushes them to Vercel whenever run manually (workflow_dispatch)
# or when this file changes on main.
#
# SENSITIVE VARS (PROXYCURL_API_KEY, SUPABASE_ACCESS_TOKEN):
#   These are marked Sensitive in Vercel and can't be read back via API, so
#   they are managed directly in the Vercel dashboard and NOT synced here.
#
# INNGEST KEYS:
#   Inngest uses different keys for production vs preview. They are set in
#   Vercel manually and intentionally excluded from this sync to avoid
#   overwriting the preview values with the production ones.
# ─────────────────────────────────────────────────────────────────────────────

jobs:
  sync:
    name: Push GitHub Secrets to Vercel
    runs-on: ubuntu-latest

    steps:
      - name: Sync env vars via Vercel API
        env:
          VERCEL_TOKEN:                         ${{ secrets.VERCEL_TOKEN }}
          VERCEL_PROJECT_ID:                    prj_D3doDIBzznOcvSScbllxtP9W5ap5
          VERCEL_TEAM_ID:                       team_wYMi2YeKNO6AkFTezIgp2YVC
          ANTHROPIC_API_KEY:                    ${{ secrets.ANTHROPIC_API_KEY }}
          SERP_API_KEY:                         ${{ secrets.SERP_API_KEY }}
          NUBELA_API_KEY:                       ${{ secrets.NUBELA_API_KEY }}
          SUPABASE_SERVICE_ROLE_KEY:            ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          NEXT_PUBLIC_SUPABASE_URL:             ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY }}
        run: |
          set -e
          BASE="https://api.vercel.com/v10/projects/${VERCEL_PROJECT_ID}/env?teamId=${VERCEL_TEAM_ID}&upsert=true"

          upsert() {
            local key="$1" value="$2" targets="$3"
            if [ -z "$value" ]; then echo "  SKIP  $key (secret not set)"; return; fi
            payload=$(jq -n --arg k "$key" --arg v "$value" --argjson t "$targets" \
              '{"key":$k,"value":$v,"type":"encrypted","target":$t}')
            http_code=$(curl -s -o /tmp/vresp.json -w "%{http_code}" -X POST "$BASE" \
              -H "Authorization: Bearer $VERCEL_TOKEN" \
              -H "Content-Type: application/json" -d "$payload")
            if [ "$http_code" = "200" ] || [ "$http_code" = "201" ]; then
              echo "  OK    $key"
            else
              echo "  ERROR $key (HTTP $http_code): $(cat /tmp/vresp.json)"
            fi
          }

          ALL='["production","preview","development"]'

          echo "Syncing to Vercel project ${VERCEL_PROJECT_ID}..."
          upsert "ANTHROPIC_API_KEY"                    "$ANTHROPIC_API_KEY"                    "$ALL"
          upsert "SERP_API_KEY"                         "$SERP_API_KEY"                         "$ALL"
          upsert "NUBELA_API_KEY"                       "$NUBELA_API_KEY"                       "$ALL"
          upsert "SUPABASE_SERVICE_ROLE_KEY"            "$SUPABASE_SERVICE_ROLE_KEY"            "$ALL"
          upsert "NEXT_PUBLIC_SUPABASE_URL"             "$NEXT_PUBLIC_SUPABASE_URL"             "$ALL"
          upsert "NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY" "$NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY" "$ALL"

          echo ""
          echo "Done. Skipped: INNGEST_* (prod/preview differ — manage in Vercel dashboard)"
          echo "       Skipped: PROXYCURL_API_KEY, SUPABASE_ACCESS_TOKEN (Sensitive — manage in Vercel dashboard)"
